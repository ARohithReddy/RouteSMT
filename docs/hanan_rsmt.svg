<svg viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace">

  <!-- Background -->
  <rect width="520" height="420" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="260" y="32" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="bold" letter-spacing="0.5">Rectilinear Steiner Minimum Tree on Hanan Grid</text>

  <!-- ── Grid lines (dashed, faint) ── -->
  <!-- Vertical grid lines at x = 80, 160, 240, 320, 400 -->
  <!-- Horizontal grid lines at y = 70, 150, 230, 310, 390 -->

  <!-- Define grid origin: x0=80 step=80, y0=70 step=80 -->

  <!-- Vertical dashed lines -->
  <line x1="80"  y1="60"  x2="80"  y2="400" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="160" y1="60"  x2="160" y2="400" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="240" y1="60"  x2="240" y2="400" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="320" y1="60"  x2="320" y2="400" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="400" y1="60"  x2="400" y2="400" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Horizontal dashed lines -->
  <line x1="60"  y1="70"  x2="440" y2="70"  stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60"  y1="150" x2="440" y2="150" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60"  y1="230" x2="440" y2="230" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60"  y1="310" x2="440" y2="310" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60"  y1="390" x2="440" y2="390" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Grid axis labels (x) -->
  <text x="80"  y="412" text-anchor="middle" fill="#484f58" font-size="10">x₀</text>
  <text x="160" y="412" text-anchor="middle" fill="#484f58" font-size="10">x₁</text>
  <text x="240" y="412" text-anchor="middle" fill="#484f58" font-size="10">x₂</text>
  <text x="320" y="412" text-anchor="middle" fill="#484f58" font-size="10">x₃</text>
  <text x="400" y="412" text-anchor="middle" fill="#484f58" font-size="10">x₄</text>

  <!-- Grid axis labels (y) -->
  <text x="52"  y="74"  text-anchor="end" fill="#484f58" font-size="10">y₀</text>
  <text x="52"  y="154" text-anchor="end" fill="#484f58" font-size="10">y₁</text>
  <text x="52"  y="234" text-anchor="end" fill="#484f58" font-size="10">y₂</text>
  <text x="52"  y="314" text-anchor="end" fill="#484f58" font-size="10">y₃</text>
  <text x="52"  y="394" text-anchor="end" fill="#484f58" font-size="10">y₄</text>

  <!-- ── RSMT wire segments (the Steiner tree) ── -->
  <!-- Color: teal for Steiner tree edges -->

  <!-- Trunk: vertical from s(160,310) up to (160,150) -->
  <line x1="160" y1="310" x2="160" y2="150" stroke="#238636" stroke-width="3" stroke-linecap="round"/>

  <!-- Branch: horizontal from (160,150) right to t2(320,150) -->
  <line x1="160" y1="150" x2="320" y2="150" stroke="#238636" stroke-width="3" stroke-linecap="round"/>

  <!-- Branch: horizontal from (160,310) right to t3(400,310) -->
  <line x1="160" y1="310" x2="400" y2="310" stroke="#238636" stroke-width="3" stroke-linecap="round"/>

  <!-- Branch: vertical from t1(80,230) up to (80,150) then right to (160,150) -->
  <line x1="80"  y1="230" x2="80"  y2="150" stroke="#238636" stroke-width="3" stroke-linecap="round"/>
  <line x1="80"  y1="150" x2="160" y2="150" stroke="#238636" stroke-width="3" stroke-linecap="round"/>

  <!-- Steiner point highlight at (160,150) -->
  <circle cx="160" cy="150" r="5" fill="#3fb950" stroke="#238636" stroke-width="1.5"/>
  <text x="168" y="145" fill="#3fb950" font-size="10" font-style="italic">Steiner pt</text>

  <!-- ── Pin nodes ── -->

  <!-- Source s at (160, 310) — grid (1,3) -->
  <circle cx="160" cy="310" r="10" fill="#1f6feb" stroke="#58a6ff" stroke-width="2"/>
  <text x="160" y="315" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">s</text>
  <text x="172" y="305" fill="#58a6ff" font-size="10">(x₁,y₃)</text>

  <!-- Sink t1 at (80, 230) — grid (0,2) -->
  <circle cx="80" cy="230" r="10" fill="#da3633" stroke="#f85149" stroke-width="2"/>
  <text x="80" y="235" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">t₁</text>
  <text x="93" y="225" fill="#f85149" font-size="10">(x₀,y₂)</text>

  <!-- Sink t2 at (320, 150) — grid (3,1) -->
  <circle cx="320" cy="150" r="10" fill="#da3633" stroke="#f85149" stroke-width="2"/>
  <text x="320" y="155" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">t₂</text>
  <text x="333" y="145" fill="#f85149" font-size="10">(x₃,y₁)</text>

  <!-- Sink t3 at (400, 310) — grid (4,3) -->
  <circle cx="400" cy="310" r="10" fill="#da3633" stroke="#f85149" stroke-width="2"/>
  <text x="400" y="315" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">t₃</text>
  <text x="413" y="305" fill="#f85149" font-size="10">(x₄,y₃)</text>

  <!-- ── Legend ── -->
  <rect x="290" y="355" width="200" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="390" y="372" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="bold">LEGEND</text>

  <circle cx="308" cy="386" r="6" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="320" y="390" fill="#8b949e" font-size="10">Source (s)</text>

  <circle cx="368" cy="386" r="6" fill="#da3633" stroke="#f85149" stroke-width="1.5"/>
  <text x="380" y="390" fill="#8b949e" font-size="10">Sink (tᵢ)</text>

  <line x1="300" y1="402" x2="320" y2="402" stroke="#238636" stroke-width="3" stroke-linecap="round"/>
  <text x="325" y="406" fill="#8b949e" font-size="10">RSMT edge</text>

  <line x1="370" y1="402" x2="390" y2="402" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="394" y="406" fill="#8b949e" font-size="10">Hanan grid</text>

</svg>
